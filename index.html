<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH MOVE - อนาคตแห่งการเดินทางไร้คนขับ</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0f172a;
            --accent-green: #10b981;
            --soft-blue: #3b82f6;
            --light-bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #1e293b;
        }

        /* Navigation Bar */
        nav {
            background-color: rgba(15, 23, 42, 0.95);
            padding: 1rem 10%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .logo {
            color: var(--white);
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .logo span { color: var(--accent-green); margin-left: 5px; }

        nav ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        nav ul li { margin-left: 30px; }

        nav ul li a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 0.95rem;
            transition: 0.3s;
        }

        nav ul li a:hover { color: var(--accent-green); }

        /* Hero Section */
        #home {
            height: 100vh;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1558444468-07089f62c647?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
