<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITH MOVE - Experience the Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-dark: #0f172a;
            --accent-green: #10b981;
            --ui-blue: #2563eb; /* ปรับสีน้ำเงินให้ชัดขึ้นสำหรับ Link */
            --bg-light: #f8fafc;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Sarabun', sans-serif; margin: 0; background: var(--bg-light); color: #334155; }

        /* Navigation */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 10%;
            position: fixed; width: 100%; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { color: white; font-weight: bold; font-size: 1.5rem; text-decoration: none; }
        .logo span { color: var(--accent-green); }
        .nav-links a { color: #94a3b8; text-decoration: none; margin-left: 25px; transition: 0.3s; font-size: 0.9rem; }

        /* Hero */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1558444468-07089f62c647?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 0 20px;
        }

        .container { padding: 80px 10%; }
        .section-title { text-align: center; margin-bottom: 50px; }
        .section-title h2 { font-size: 2.5rem; color: var(--main-dark); }

        /* Team Section ปรับปรุงใหม่ */
        .team-mosaic {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* กล่องบุคลากรที่ทำหน้าที่เป็นปุ่มกด */
        .member-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #e2e8f0;
            border-bottom: 5px solid var(--ui-blue);
            text-decoration: none !important; /* บังคับลบเส้นใต้ */
            display: block;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .member-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            border-bottom-color: var(--accent-green);
        }

        .member-card .name {
            font-weight: bold;
            display: block;
            color: var(--ui-blue); /* สีน้ำเงินเพื่อให้รู้ว่าเป็นลิงก์ */
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-decoration: underline; /* ขีดเส้นใต้ที่ชื่อเพื่อให้ชัดเจน */
        }

        .member-card .student-id {
            font-size: 0.85rem;
            color: #64748b;
            display: block;
            margin-bottom: 10px;
        }

        .member-card .role {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.4;
            margin-bottom: 15px;
            display: block;
        }

        /* ปุ่มหลอกด้านล่างการ์ดเพื่อให้คนรู้ว่าต้องคลิก */
